<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小小專注家｜配對闖關</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    :root { --ink:#3c4670; --cream:#fffaf0; --yellow:#ffd84d; --pink:#ff89ad; --sky:#85d9ff; --purple:#b99bf5; --mint:#83dfc2; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); font-family:'Noto Sans TC',sans-serif; background:#8edcff; overflow-x:hidden; }
    .world { position:relative; min-height:100vh; overflow:hidden; background:linear-gradient(#83d9fa 0 52%,#a8e898 52%); padding:25px 16px 42px; }
    .cloud { position:absolute; width:150px; height:46px; border-radius:45px; background:#fff; opacity:.86; }
    .cloud:before,.cloud:after { content:''; position:absolute; background:#fff; border-radius:50%; }
    .cloud:before { width:66px;height:66px; bottom:0;left:25px; } .cloud:after{ width:48px;height:48px;bottom:0;right:20px; }
    .c1{top:95px;left:4%;transform:scale(.7)} .c2{top:50px;right:5%;transform:scale(.55)} .c3{top:360px;right:-20px;transform:scale(.75)}
    .sun { position:absolute; top:28px; right:13%; width:72px;height:72px;border-radius:50%;background:var(--yellow); box-shadow:0 0 0 12px #ffe987; }
    .hills { position:absolute; bottom:0; left:-5%; width:110%; height:150px; background:#72ca77; border-radius:50% 50% 0 0 / 100% 100% 0 0; }
    .flowers { position:absolute;bottom:24px;left:6%; font-size:34px;letter-spacing:35px;white-space:nowrap;transform:rotate(-5deg); }
    main { position:relative; z-index:2; max-width:1050px;margin:auto; }
    header { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; }
    .brand { display:flex;align-items:center;gap:11px; } .brand-mark { width:61px;height:61px;border-radius:22px;background:var(--yellow);display:grid;place-items:center;font-size:34px;box-shadow:0 5px 0 #e9b62f;transform:rotate(-5deg); }
    h1 { margin:0; font-family:Fredoka,'Noto Sans TC',sans-serif;font-size:clamp(25px,5vw,40px);line-height:1;color:#fff;letter-spacing:1px;text-shadow:0 3px 0 #4d99bc; } .subtitle{color:#eaffff;font-size:14px;font-weight:700;}
    .progress { display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.77);padding:9px 13px;border-radius:30px;box-shadow:0 4px 0 rgba(57,125,146,.2);font-weight:900; }
    .dot{width:27px;height:27px;border-radius:50%;background:#d7e5e9;color:#79939d;display:grid;place-items:center;font-size:13px;}.dot.active,.dot.done{background:var(--pink);color:white}.dot.done{background:var(--mint)}.line{width:16px;height:5px;background:#d7e5e9;border-radius:9px}.line.done{background:var(--mint)}
    .game-card { background:rgba(255,253,245,.94);border:5px solid white;border-radius:33px;padding:clamp(18px,4vw,34px);box-shadow:0 11px 0 rgba(55,128,105,.28); }
    .stage-head { text-align:center;margin-bottom:18px; }.stage-chip{display:inline-block;background:#f4e6ff;color:#8461bd;border-radius:20px;padding:5px 15px;font-weight:900;font-size:14px}.stage-head h2{margin:8px 0 5px;font-size:clamp(22px,4vw,30px);color:#ff6c98;}.stage-head p{margin:0;font-weight:700;color:#68749a;}
    .board { display:grid;grid-template-columns:1fr 1fr; gap:clamp(18px,4vw,45px);align-items:start; }.side-title{font-weight:900;text-align:center;margin:0 0 11px;color:#617199;}.items{display:grid;gap:9px;}.draggable,.target{min-height:54px;border-radius:17px;padding:8px 11px;display:flex;align-items:center;gap:10px;font-weight:800;user-select:none;}.draggable{background:white;border:3px solid #e4e9f5;cursor:grab;box-shadow:0 3px 0 #d5dbe9;transition:.16s transform,.16s opacity;}.draggable:hover{transform:translateY(-2px) rotate(-1deg)}.draggable.dragging{opacity:.45;cursor:grabbing}.target{border:3px dashed #bfc9e1;background:#f5f7fc;justify-content:center;color:#8490aa;transition:.18s}.target.over{background:#fff0a9;border-color:#f6c93d;transform:scale(1.02)}.target.matched{border-style:solid;border-color:#7bd5ae;background:#e4faed;color:#397c5d;}.token{height:36px;width:36px;flex:0 0 36px;border-radius:50%;display:grid;place-items:center;font-size:20px;color:white;box-shadow:inset 0 -3px rgba(0,0,0,.12)}.shape{background:transparent!important;box-shadow:none!important;font-size:34px!important;}.hint{margin:18px auto 0;text-align:center;max-width:560px;padding:9px 15px;border-radius:16px;background:#e9f7ff;color:#4f7d97;font-weight:700;font-size:14px;}.sparkle{font-size:18px;vertical-align:middle}.restart{display:block;margin:15px auto 0;border:0;background:transparent;color:#60749b;text-decoration:underline;font:700 14px 'Noto Sans TC';cursor:pointer;}
    .modal { position:fixed;inset:0;z-index:20;display:none;place-items:center;background:rgba(51,74,113,.38);padding:16px; }.modal.show{display:grid}.modal-box{width:min(410px,100%);background:#fffdf6;border:6px solid white;border-radius:35px;text-align:center;padding:30px 24px 25px;box-shadow:0 14px 0 rgba(52,75,107,.3);animation:pop .35s ease-out}.modal-icon{font-size:68px;line-height:1}.modal-box h2{font-size:29px;color:#f76f9d;margin:10px 0 5px}.modal-box p{font-weight:700;color:#667399;margin:0 0 19px}.next{border:0;border-radius:18px;background:var(--pink);color:white;padding:12px 27px;font:900 18px 'Noto Sans TC';box-shadow:0 5px 0 #d85281;cursor:pointer}.next:active{transform:translateY(3px);box-shadow:0 2px 0 #d85281}@keyframes pop{from{transform:scale(.6) rotate(-6deg);opacity:0}to{transform:scale(1);opacity:1}}
    @media(max-width:650px){.sun{right:7%;transform:scale(.7)} header{align-items:flex-start}.progress{padding:7px}.board{grid-template-columns:1fr;gap:19px}.target-list{order:-1}.world{padding-top:18px}.game-card{border-radius:25px}.dot{width:23px;height:23px}.line{width:9px}.flowers{font-size:25px;letter-spacing:19px}}
  </style>
</head>
<body>
  <div class="world"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="hills"></div><div class="flowers">🌼 🌷 🌼 🌷 🌼</div>
    <main>
      <header><div class="brand"><div class="brand-mark">🦊</div><div><h1>小小專注家</h1><div class="subtitle">動動小手，完成配對任務！</div></div></div><div class="progress" aria-label="闖關進度"><span class="dot active" id="p1">1</span><span class="line" id="l1"></span><span class="dot" id="p2">2</span><span class="line" id="l2"></span><span class="dot" id="p3">3</span></div></header>
      <section class="game-card" aria-live="polite"><div class="stage-head"><span class="stage-chip" id="stageChip">第一階段・彩色服務站</span><h2 id="stageTitle">把服務送到對的顏色家！</h2><p id="stageText">拖曳左邊的服務卡，放到相同顏色的圈圈裡。</p></div><div class="board"><div><p class="side-title">服務卡</p><div class="items" id="source"></div></div><div class="target-list"><p class="side-title">顏色小屋</p><div class="items" id="targets"></div></div></div><div class="hint"><span class="sparkle">✨</span> 可以用滑鼠拖曳，也可以先點選卡片再點選目標！</div><button class="restart" id="restart">重新開始這一關</button></section>
    </main>
  </div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal-box"><div class="modal-icon" id="modalIcon">🎉</div><h2 id="modalTitle">太棒了！</h2><p id="modalText">所有配對都完成囉！</p><button class="next" id="nextBtn">下一關</button></div></div>
  <script>
    const stages=[
      {chip:'第一階段・彩色服務站',title:'把服務送到對的顏色家！',text:'拖曳左邊的服務卡，放到相同顏色的圈圈裡。',type:'color', items:[['健康檢查','❤️','#f77c78'],['發展評估','🌟','#f4bf42'],['初級照護','☘️','#77c99b'],['育兒諮詢','💬','#82b9ee'],['衛生教育','📚','#a58be0'],['預防接種','💉','#f394bd'],['居家訪視','🏠','#f2a164']]},
      {chip:'第二階段・形狀追蹤站',title:'找出一模一樣的形狀！',text:'三項重要追蹤，等你幫忙送達正確位置。',type:'shape',items:[['預防保健','●','#61bdda'],['疫苗接種','▲','#ec8b88'],['膽道閉鎖追蹤','■','#a188df']]},
      {chip:'第三階段・通報轉介站',title:'顏色和圖形都要相同喔！',text:'最後一關，仔細看看每張通報轉介卡。',type:'both',items:[['牙齒塗氟','●','#65bdd8'],['就醫轉診','▲','#ef9c5e'],['發展遲緩','■','#a384d8'],['兒少保護','◆','#ef789b']]}
    ];
    let current=0, selected=null, matches=0;
    const source=document.getElementById('source'), targets=document.getElementById('targets');
    const el=id=>document.getElementById(id);
    function token(item,type){ const [name,symbol,color]=item; const isShape=type!=='color'; return `<span class="token ${isShape?'shape':''}" style="${isShape?'color:'+color:'background:'+color}">${type==='color'?'':symbol}</span>`; }
    function targetLabel(item,type){if(type==='color')return '相同顏色小屋';if(type==='shape')return '相同形狀小屋';return '相同顏色與形狀小屋';}
    function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
    function render(){ const stage=stages[current];matches=0;selected=null;el('stageChip').textContent=stage.chip;el('stageTitle').textContent=stage.title;el('stageText').textContent=stage.text;source.innerHTML='';targets.innerHTML='';
      shuffle(stage.items).forEach((item,i)=>{let card=document.createElement('div');card.className='draggable';card.draggable=true;card.dataset.key=item[0];card.innerHTML=token(item,stage.type)+`<span>${item[0]}</span>`;card.addEventListener('dragstart',()=>{selected=card;card.classList.add('dragging')});card.addEventListener('dragend',()=>card.classList.remove('dragging'));card.addEventListener('click',()=>{document.querySelectorAll('.draggable').forEach(x=>x.style.outline='');selected=card;card.style.outline='3px solid #ffd34f';});source.appendChild(card);});
      shuffle(stage.items).forEach(item=>{let box=document.createElement('div');box.className='target';box.dataset.key=item[0];box.innerHTML=token(item,stage.type)+`<span>${targetLabel(item,stage.type)}</span>`;box.addEventListener('dragover',e=>{e.preventDefault();box.classList.add('over')});box.addEventListener('dragleave',()=>box.classList.remove('over'));box.addEventListener('drop',e=>{e.preventDefault();box.classList.remove('over');tryMatch(box)});box.addEventListener('click',()=>tryMatch(box));targets.appendChild(box);});updateProgress(); }
    function tryMatch(box){ if(!selected||box.classList.contains('matched'))return;if(selected.dataset.key===box.dataset.key){box.classList.add('matched');box.querySelector('span:last-child').textContent=selected.dataset.key+' ✓';selected.remove();selected=null;matches++;if(matches===stages[current].items.length)setTimeout(showModal,260);}else{box.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:240});} }
    function updateProgress(){for(let i=1;i<=3;i++){el('p'+i).className='dot '+(i<current+1?'done':i===current+1?'active':'');if(i<3)el('l'+i).className='line '+(i<current+1?'done':'');}}
    function showModal(){const last=current===2;el('modalIcon').textContent=last?'🏆':'🎉';el('modalTitle').textContent=last?'恭喜過關！':'太棒了！';el('modalText').textContent=last?'你完成所有專注力配對挑戰，真是小小專注高手！':'這一關的任務都完成了，準備前往下一關！';el('nextBtn').textContent=last?'再玩一次':'下一關';el('modal').classList.add('show');}
    el('nextBtn').addEventListener('click',()=>{el('modal').classList.remove('show');current=current===2?0:current+1;render();});el('restart').addEventListener('click',render);render();
  </script>
</body>
</html>
